name: Release VKarmani Desktop

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  build-windows:
    name: Build Windows release with updater artifacts
    if: github.event_name != 'pull_request'
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0
        with:
          lfs: true

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $tokens = $null
          foreach ($file in Get-ChildItem .\scripts -Filter *.ps1) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              throw "PowerShell syntax check failed for $($file.FullName)"
            }
            Write-Host "[ps-check] OK: $($file.Name)"
          }

      - name: Download official Xray Windows x64 runtime
        shell: pwsh
        run: .\scripts\fetch-xray-windows.ps1 -Force

      - name: Verify bundled Xray binary on Windows
        shell: pwsh
        run: .\scripts\verify-xray-windows.ps1

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Force public npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fund false
          npm config get registry

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run Remnawave parser tests
        run: npm run test:parsers

      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit --deny warnings
        working-directory: src-tauri

      - name: Verify updater config
        run: npm run verify:updater
        env:
          GITHUB_ACTIONS: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.5.23
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: VKarmani Desktop ${{ github.ref_name }}
          releaseBody: |
            Автоматическая сборка VKarmani Desktop.

            Для автообновлений в assets должны быть:
            - latest.json
            - установщик Windows
            - .sig подписи updater artifacts
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
